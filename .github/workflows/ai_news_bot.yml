name: AI News Automation

on:
  schedule:
    - cron: "15 5 * * *"
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Create .env file
        run: |
          echo "OPENROUTER_API_KEY=${{ secrets.OPENAI_API_KEY }}" >> .env
          echo "NEWS_API_KEY=${{ secrets.NEWS_API_KEY }}" >> .env      

      - name: Run pipeline
        run: python run_pipeline.py

      - name: Send email notification
        if: always()
        run: |
          pip install yagmail
          python - <<EOF
          import yagmail, os

          smtp_user = os.getenv("SMTP_USER")
          smtp_pass = os.getenv("SMTP_PASS")

          yag = yagmail.SMTP(
              user=smtp_user,
              password=smtp_pass,
              host="smtp-relay.brevo.com",
              port=587
          )

          yag.send(
              to=smtp_user,
              subject="AI News Bot Run Status",
              contents="Your AI YouTube bot finished running. Check GitHub Actions for details."
          )

          print("Email notification sent")
          EOF
                  env:
                    SMTP_USER: ${{ secrets.SMTP_USER }}
                    SMTP_PASS: ${{ secrets.SMTP_PASS }}

