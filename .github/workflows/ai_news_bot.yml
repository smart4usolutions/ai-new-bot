name: AI News Automation

on:
  schedule:
    - cron: "30 0 * * *"
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Create .env file
        run: |
          echo "OPENROUTER_API_KEY=${{ secrets.OPENAI_API_KEY }}" >> .env
          echo "NEWS_API_KEY=${{ secrets.NEWS_API_KEY }}" >> .env
          echo "ELEVEN_API_KEY=${{ secrets.ELEVEN_API_KEY }}" >> .env      

      - name: Create client_secret.json
        run: echo '${{ secrets.CLIENT_SECRET }}' > client_secret.json

      - name: Create token.json
        run: echo '${{ secrets.TOKEN_JSON }}' > token.json          

      - name: Run pipeline
        run: python run_pipeline.py
